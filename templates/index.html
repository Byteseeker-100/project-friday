<!DOCTYPE html>

<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">

    <link rel="manifest" href="/static/manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>FRIDAY AI</title>

</head>

<style>
     .user {
        display: block;
        width: fit-content;
        text-align: right;
        color: black;
        background: #38bdf8;
        padding: 10px;
        margin: 10px 0;
        border-radius: 10px;
        max-width: 60%;
        margin-left: auto;
    }
    .ai {
        display: block;
        width: fit-content;
        text-align: left;
        color: #e2e8f0;
        background: #1e293b;
        padding: 10px;
        margin: 10px 0;
        border-radius: 10px;
        max-width: 60%;
        margin-right: auto;
    }
    .ai code {
    background: #020617;
    padding: 2px 6px;
    border-radius: 6px;
    font-family: monospace;
}

.ai pre {
    background: #020617;
    padding: 10px;
    border-radius: 10px;
    overflow-x: auto;
}

.ai p {
    margin: 0 0 8px;
}

.ai ul {
    padding-left: 18px;
}
    #chat {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        padding-bottom: 70px;
    }
    body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100dvh;
        background: linear-gradient(180deg, #0f172a, #020617);
        color: white;
        padding-bottom: env(safe-area-inset-bottom);
    }
    .input-box {
        display: flex;
        padding: 10px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
        background: #111827;
        border-top: 1px solid #333;
    }
    .input-box input {
        flex: 1;
        padding: 12px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        outline: none;
    }
    .input-box button {
        margin-left: 10px;
        padding: 12px 15px;
        font-size: 14px;
        border: none;
        background: #38bdf8;
        border-radius: 8px;
    }
    .input-box button:hover {
        background: #0ea5e9;
    }
    .top-bar {
        text-align: center;
        padding: 15px;
        font-size: 20px;
        font-weight: bold;
        background: hsl(0, 0%, 0%);
        border-bottom: 1px solid #333;
        color: #38bdf8;
        text-shadow: 0 0 10px #38bdf8;
    }
    .dot {
        height: 8px;
        width: 8px;
        margin: 0 3px;
        background-color: #38bdf8;
        border-radius: 50%;
        display: inline-block;
        animation: blink 1.4s infinite;
    }
    .dot:nth-child(2) {
        animation-delay: 0.2s;
    }
    .dot:nth-child(3) {
        animation-delay: 0.4s;
    } 
    @keyframes blink {
        0% { opacity: 0.2; }
        20% { opacity: 1; }
        100% { opacity: 0.2; }
    }
    html {
    scroll-behavior: smooth;
    }
    html, body {
        margin: 0;
        padding: 0;
        background: #020617;
    }
</style>

<body>
    <h1 class="top-bar">FRIDAY AI ⚡</h1>

    <div id="chat"></div>
    <div class="input-box" style="display:flex; gap:8px; align-items:center;">

        <input type="text" id="message" placeholder="ASK FRIDAY..."
            style="flex:1; padding:12px; border-radius:10px; border:none;
            background:#1e293b; color:white; outline:none;">

        <button onclick="startVoice()"
            style="padding:10px 12px; border:none; border-radius:10px;
            background:#0ea5e9; color:white; font-size:18px;">
            🎤
        </button>

        <button onclick="sendMessage()"
            style="padding:10px 12px; border:none; border-radius:10px;
            background:#22c55e; color:white; font-size:18px;">
            ➤
        </button>

    </div>
    <script>
    
    document.getElementById("message").addEventListener("keypress", function(event) {
        if (event.key === "Enter" && !isLoading) {
            sendMessage();
        }
    });

    let isLoading = false;

    async function sendMessage() {
                    let input = document.getElementById("message");
                    let message = input.value;

                    if (message.trim() === "" || isLoading) return
                
                    let chat = document.getElementById("chat");
                    chat.innerHTML +=  `<div class="user">${message}</div>`;
                    chat.scrollTop = chat.scrollHeight;

                    input.value = "";

                    chat.innerHTML += `
                    <div class="ai" id="typing">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>`;
                    chat.scrollTop = chat.scrollHeight;

                    isLoading = true;

                    let response = await fetch("/chat", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            message: message
                        })
                    })

                    let data = await response.json();
                    document.getElementById("typing").remove();

                    chat.innerHTML += `<div class="ai">${marked.parse(data.reply)}</div>`;
                    chat.scrollTop = chat.scrollHeight;
                  
                    isLoading = false;
               }
    function startVoice() {
        if (!("webkitSpeechRecognition" in window)) {
            alert("Voice input is not supported in this browser.");
            return;
        }

        let recognition = new webkitSpeechRecognition();
        recognition.lang = "en-US";
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.start();

        recognition.onresult = function(event) {
            let voiceText = event.results[0][0].transcript;
            document.getElementById("message").value = voiceText;
        };

        recognition.onerror = function(event) {
            alert("Voice error: " + event.error);
        };
    }
    
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>

</html>
