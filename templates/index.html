<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="/static/manifest.json">

    <title>FRIDAY AI</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #020617;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            color: white;
            background: linear-gradient(180deg, #0f172a, #020617);
        }

        .top-bar {
            text-align: center;
            padding: 16px;
            font-size: 22px;
            font-weight: bold;
            background: #000;
            border-bottom: 1px solid #333;
            color: #38bdf8;
            text-shadow: 0 0 10px #38bdf8;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            padding-bottom: 90px;
        }

        .user {
            width: fit-content;
            max-width: 75%;
            margin: 10px 0 10px auto;
            padding: 10px 12px;
            border-radius: 12px;
            background: #38bdf8;
            color: black;
            text-align: left;
        }

        .ai {
            width: fit-content;
            max-width: 75%;
            margin: 10px auto 10px 0;
            padding: 10px 12px;
            border-radius: 12px;
            background: #1e293b;
            color: #e2e8f0;
            text-align: left;
        }

        .ai code {
            background: #020617;
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
        }

        .ai pre {
            background: #020617;
            padding: 10px;
            border-radius: 10px;
            overflow-x: auto;
        }

        .ai p {
            margin: 0 0 8px;
        }

        .ai ul {
            padding-left: 18px;
        }

        .input-box {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            background: #111827;
            border-top: 1px solid #334155;
        }

        .input-box input {
            flex: 1;
            min-width: 0;
            height: 54px;
            padding: 0 16px;
            border: none;
            border-radius: 14px;
            outline: none;
            background: #1e293b;
            color: white;
            font-size: 16px;
        }

        .input-box input::placeholder {
            color: #94a3b8;
        }

        .mic-btn,
        .send-btn {
            width: 54px;
            height: 54px;
            min-width: 54px;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
        }

        .mic-btn {
            background: #0ea5e9;
        }

        .send-btn {
            background: #22c55e;
        }

        .mic-btn:active,
        .send-btn:active {
            transform: scale(0.88);
            opacity: 0.75;
        }

        .dot {
            height: 8px;
            width: 8px;
            margin: 0 3px;
            background-color: #38bdf8;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>

<body>
    <h1 class="top-bar">FRIDAY AI ⚡</h1>

    <div id="chat"></div>

    <div class="input-box">
        <input type="text" id="message" placeholder="ASK FRIDAY...">
        <button class="mic-btn" type="button" onclick="startVoice()">🎤</button>
        <button class="send-btn" type="button" onclick="sendMessage()">➤</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        let isLoading = false;

        document.getElementById("message").addEventListener("keypress", function(event) {
            if (event.key === "Enter" && !isLoading) {
                sendMessage();
            }
        });

        async function sendMessage() {
            let input = document.getElementById("message");
            let message = input.value.trim();

            if (message === "" || isLoading) return;

            let chat = document.getElementById("chat");

            chat.innerHTML += `<div class="user">${message}</div>`;
            chat.scrollTop = chat.scrollHeight;

            input.value = "";

            chat.innerHTML += `
                <div class="ai" id="typing">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            `;

            chat.scrollTop = chat.scrollHeight;
            isLoading = true;

            try {
                let response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message: message })
                });

                let data = await response.json();

                document.getElementById("typing").remove();

                chat.innerHTML += `<div class="ai">${marked.parse(data.reply)}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (error) {
                document.getElementById("typing").remove();
                chat.innerHTML += `<div class="ai">⚠️ Connection error. Try again.</div>`;
            }

            isLoading = false;
        }

        function startVoice() {
            if (!("webkitSpeechRecognition" in window)) {
                alert("Voice input is not supported in this browser.");
                return;
            }

            let recognition = new webkitSpeechRecognition();
            recognition.lang = "en-US";
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.start();

            recognition.onresult = function(event) {
                let voiceText = event.results[0][0].transcript;
                document.getElementById("message").value = voiceText;
            };

            recognition.onerror = function(event) {
                alert("Voice error: " + event.error);
            };
        }
    </script>
</body>
</html>
