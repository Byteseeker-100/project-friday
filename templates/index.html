<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="/static/manifest.json">

    <title>FRIDAY AI</title>

    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #020617;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            color: white;
            background: linear-gradient(180deg, #0f172a, #020617);
        }

        .top-bar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            font-size: 20px;
            font-weight: bold;
            background: #000;
            border-bottom: 1px solid #333;
            color: #38bdf8;
            text-shadow: 0 0 12px #38bdf8;
        }

        .logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
            filter: drop-shadow(0 0 6px #38bdf8);
        }

        .menu-btn {
            position: absolute;
            right: 14px;
            background: transparent;
            border: none;
            color: #38bdf8;
            font-size: 24px;
        }

        .menu-box {
            display: none;
            position: absolute;
            top: 55px;
            right: 12px;
            background: #020617;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 8px;
            z-index: 1000;
            box-shadow: 0 0 18px rgba(56, 189, 248, 0.35);
        }

        .menu-box button {
            display: block;
            width: 130px;
            padding: 12px;
            margin: 4px 0;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 10px;
            text-align: left;
            font-size: 15px;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            padding-bottom: 90px;
        }

        .user {
            width: fit-content;
            max-width: 75%;
            margin: 10px 0 10px auto;
            padding: 10px 12px;
            border-radius: 12px;
            background: #38bdf8;
            color: black;
        }

        .ai {
            width: fit-content;
            max-width: 75%;
            margin: 10px auto 10px 0;
            padding: 10px 12px;
            border-radius: 12px;
            background: #1e293b;
            color: #e2e8f0;
        }

        .ai code {
            background: #020617;
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
        }

        .ai pre {
            background: #020617;
            padding: 10px;
            border-radius: 10px;
            overflow-x: auto;
        }

        .ai p { margin: 0 0 8px; }

        .input-box {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            background: #111827;
            border-top: 1px solid #334155;
        }

        .input-box input {
            flex: 1;
            min-width: 0;
            height: 54px;
            padding: 0 16px;
            border: none;
            border-radius: 14px;
            outline: none;
            background: #1e293b;
            color: white;
            font-size: 16px;
        }

        .mic-btn, .send-btn {
            width: 54px;
            height: 54px;
            min-width: 54px;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.12s ease, opacity 0.12s ease;
        }

        .mic-btn { background: #0ea5e9; }
        .send-btn { background: #22c55e; }

        .mic-btn:active, .send-btn:active {
            transform: scale(0.88);
            opacity: 0.75;
        }

        .dot {
            height: 8px;
            width: 8px;
            margin: 0 3px;
            background-color: #38bdf8;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.4s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        #vision {
            position: relative;
            flex: 1;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 70%);
            color: #38bdf8;
        }

        .vision-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(56,189,248,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,0.08) 1px, transparent 1px);
            background-size: 35px 35px;
            animation: gridMove 12s linear infinite;
        }

        .vision-layout {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 85px;
            padding: 30px;
        }

        .vision-core {
            position: relative;
            width: 360px;
            height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .audio-ring {
            position: absolute;
            width: 330px;
            height: 330px;
            border-radius: 50%;
        }

        .audio-bar {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 4px;
            height: 18px;
            background: linear-gradient(#22d3ee, #2563eb);
            border-radius: 10px;
            transform-origin: 0 140px;
            box-shadow: 0 0 10px #38bdf8;
            opacity: 0.7;
            transition: height 0.08s linear, opacity 0.08s linear;
        }

        .glow-ring {
            position: absolute;
            width: 245px;
            height: 245px;
            border-radius: 50%;
            border: 2px solid rgba(56,189,248,0.85);
            box-shadow: 0 0 25px rgba(56,189,248,0.9), inset 0 0 18px rgba(56,189,248,0.25);
        }

        .inner-core {
            width: 165px;
            height: 165px;
            border: 2px solid #38bdf8;
            border-radius: 50%;
            box-shadow: 0 0 25px #38bdf8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(2, 6, 23, 0.72);
            text-align: center;
            z-index: 3;
        }

        #visionStatus {
            font-size: 22px;
            letter-spacing: 5px;
            font-weight: bold;
            color: #7dd3fc;
            text-shadow: 0 0 16px #38bdf8;
        }

        .vision-sub {
            margin-top: 8px;
            font-size: 12px;
            letter-spacing: 3px;
            color: #94a3b8;
        }

        .visual-panel {
            width: 370px;
            min-height: 230px;
            max-height: 430px;
            overflow-y: auto;
            border: 1px solid rgba(56,189,248,0.7);
            background: rgba(2, 6, 23, 0.76);
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 0 25px rgba(56,189,248,0.25);
            backdrop-filter: blur(6px);
        }

        .visual-panel h3 {
            margin: 0 0 14px;
            font-size: 15px;
            letter-spacing: 3px;
            color: #e2e8f0;
            border-bottom: 1px solid rgba(56,189,248,0.35);
            padding-bottom: 12px;
        }

        #visionOutput {
            font-size: 15px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .wave {
            margin-top: 12px;
            display: flex;
            gap: 5px;
            z-index: 4;
        }

        .wave span {
            width: 4px;
            height: 18px;
            background: #38bdf8;
            border-radius: 8px;
            box-shadow: 0 0 10px #38bdf8;
            animation: waveAnim 1s infinite ease-in-out;
        }

        .wave span:nth-child(2) { animation-delay: 0.2s; }
        .wave span:nth-child(3) { animation-delay: 0.4s; }
        .wave span:nth-child(4) { animation-delay: 0.6s; }

        @keyframes waveAnim {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1.5); }
        }

        @keyframes rotateRight {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 35px 35px; }
        }

        @media (max-width: 800px) {
            .vision-layout {
                flex-direction: column;
                gap: 28px;
                padding: 20px;
            }

            .vision-core {
                width: 280px;
                height: 280px;
            }

            .audio-ring {
                width: 260px;
                height: 260px;
            }

            .audio-bar {
                height: 24px;
                transform-origin: 0 112px;
            }

            .glow-ring {
                width: 195px;
                height: 195px;
            }

            .inner-core {
                width: 135px;
                height: 135px;
            }

            #visionStatus {
                font-size: 17px;
                letter-spacing: 3px;
            }

            .visual-panel {
                width: 92%;
                max-height: 220px;
            }
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <img src="/static/icon.png" class="logo">
        <span>FRIDAY AI</span>

        <button class="menu-btn" onclick="toggleMenu()">☰</button>

        <div class="menu-box" id="menuBox">
            <button onclick="showChat()">💬 Chat</button>
            <button onclick="showVision()">◉ Vision</button>
        </div>
    </div>

    <div id="chat">
        <div class="ai">
            👋 Hello, I’m <b>FRIDAY</b>.<br>
            How can I assist you today?
        </div>
    </div>

    <div id="vision" style="display:none;">
        <div class="vision-grid"></div>

        <div class="vision-layout">
            <div class="vision-core">
                <div class="audio-ring" id="audioRing"></div>
                <div class="glow-ring"></div>

                <div class="inner-core">
                    <div id="visionStatus">FRIDAY</div>
                    <div class="vision-sub">SYSTEM ONLINE</div>

                    <div class="wave" id="voiceWave" style="display:none;">
                        <span></span><span></span><span></span><span></span>
                    </div>
                </div>
            </div>

            <div class="visual-panel">
                <h3>VISUAL OUTPUT</h3>
                <div id="visionOutput">Say “Friday” to activate.</div>
            </div>
        </div>
    </div>

    <div class="input-box" id="inputBox">
        <input type="text" id="message" placeholder="ASK FRIDAY...">
        <button class="mic-btn" type="button" onclick="startVoice()">🎤</button>
        <button class="send-btn" type="button" onclick="sendMessage()">➤</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        let isLoading = false;
        let recognition;
        let visionRecognition;
        let isVisionActive = false;
        let wakeDetected = false;

        let audioContext;
        let analyser;
        let micSource;
        let micStream;
        let waveAnimationId;
        let speakingFakeWave = false;

        function createAudioRing() {
            const ring = document.getElementById("audioRing");
            if (!ring || ring.children.length > 0) return;

            for (let i = 0; i < 72; i++) {
                let bar = document.createElement("div");
                bar.className = "audio-bar";
                bar.style.transform = `rotate(${i * 5}deg) translateY(-140px)`;
                ring.appendChild(bar);
            }
        }

        createAudioRing();
        setRingIdle();

        async function startRealMicWave() {
            if (micStream) {
                animateAudioRing();
                return;
            }

            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.75;
                micSource = audioContext.createMediaStreamSource(micStream);
                micSource.connect(analyser);
                animateAudioRing();
            } catch (e) {
                console.log("Mic wave permission/error:", e);
                setRingIdle();
            }
        }

        function stopRealMicWave() {
            if (waveAnimationId) cancelAnimationFrame(waveAnimationId);
            waveAnimationId = null;
            speakingFakeWave = false;
            setRingIdle();
        }

        function setRingIdle() {
            document.querySelectorAll(".audio-bar").forEach((bar, i) => {
                const h = 16 + (i % 8);
                bar.style.height = h + "px";
                bar.style.opacity = "0.45";
            });
        }

        function animateAudioRing() {
            const bars = document.querySelectorAll(".audio-bar");
            const dataArray = analyser ? new Uint8Array(analyser.frequencyBinCount) : null;

            function draw() {
                if (!isVisionActive) return;

                if (speakingFakeWave) {
                    bars.forEach((bar, i) => {
                        const h = 18 + Math.abs(Math.sin(Date.now() / 160 + i * 0.35)) * 44;
                        bar.style.height = h + "px";
                        bar.style.opacity = "1";
                    });
                    waveAnimationId = requestAnimationFrame(draw);
                    return;
                }

                if (analyser && dataArray) {
                    analyser.getByteFrequencyData(dataArray);

                    bars.forEach((bar, i) => {
                        const value = dataArray[i % dataArray.length] || 0;
                        const height = 14 + (value / 255) * 58;
                        bar.style.height = height + "px";
                        bar.style.opacity = value > 12 ? "1" : "0.5";
                    });
                } else {
                    setRingIdle();
                }

                waveAnimationId = requestAnimationFrame(draw);
            }

            if (!waveAnimationId) draw();
        }

        function startSpeakingWave() {
            speakingFakeWave = true;
            showWave(true);
            animateAudioRing();
        }

        function stopSpeakingWave() {
            speakingFakeWave = false;
            showWave(false);
        }

        document.getElementById("message").addEventListener("keypress", function(event) {
            if (event.key === "Enter" && !isLoading) {
                sendMessage();
            }
        });
        function showVisionOutput(text) {
            let box = document.getElementById("visionOutput");

            let clean = text
                .replace(/[*_`#>-]/g, "")
                .split("\n")
                .filter(line => line.trim() !== "")
                .slice(0, 5);

            box.innerHTML = clean.map(line => `• ${line}`).join("<br>");
        }

        function toggleMenu() {
            let menu = document.getElementById("menuBox");
            menu.style.display = menu.style.display === "block" ? "none" : "block";
        }

        function showChat() {
            document.getElementById("chat").style.display = "block";
            document.getElementById("vision").style.display = "none";
            document.getElementById("inputBox").style.display = "flex";
            document.getElementById("menuBox").style.display = "none";

            wakeDetected = false;
            stopSpeaking();
            stopRealMicWave();

            if (visionRecognition) {
                visionRecognition.stop();
                isVisionActive = false;
            }
        }

        function showVision() {
            document.getElementById("chat").style.display = "none";
            document.getElementById("vision").style.display = "block";
            document.getElementById("inputBox").style.display = "none";
            document.getElementById("menuBox").style.display = "none";

            updateVisionStatus("FRIDAY");
            showWave(false);
            startRealMicWave();

            if (!isVisionActive) {
                startVisionVoice();
                isVisionActive = true;
            }
        }

        function updateVisionStatus(text) {
            document.getElementById("visionStatus").innerText = text;
        }

        function showWave(show) {
            document.getElementById("voiceWave").style.display = show ? "flex" : "none";
        }

        function stopSpeaking() {
            if ("speechSynthesis" in window) {
                speechSynthesis.cancel();
            }
            stopSpeakingWave();
        }

        async function sendMessage() {
            let input = document.getElementById("message");
            let message = input.value.trim();

            if (message === "" || isLoading) return;

            let chat = document.getElementById("chat");

            chat.innerHTML += `<div class="user">${message}</div>`;
            chat.scrollTop = chat.scrollHeight;

            input.value = "";

            chat.innerHTML += `
                <div class="ai" id="typing">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            `;

            chat.scrollTop = chat.scrollHeight;
            isLoading = true;

            try {
                let response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });

                let data = await response.json();

                document.getElementById("typing").remove();

                chat.innerHTML += `<div class="ai">${marked.parse(data.reply)}</div>`;
                chat.scrollTop = chat.scrollHeight;

            } catch (error) {
                document.getElementById("typing").remove();
                chat.innerHTML += `<div class="ai">⚠️ Connection error. Try again.</div>`;
            }

            isLoading = false;
        }

        function startVoice() {
            if (!("webkitSpeechRecognition" in window)) {
                alert("Voice input is not supported in this browser.");
                return;
            }

            recognition = new webkitSpeechRecognition();
            recognition.lang = "en-US";
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.start();

            recognition.onresult = function(event) {
                let voiceText = event.results[0][0].transcript;
                document.getElementById("message").value = voiceText;
                sendMessage();
            };

            recognition.onerror = function(event) {
                alert("Voice error: " + event.error);
            };
        }

        function startVisionVoice() {
            if (!("webkitSpeechRecognition" in window)) {
                updateVisionStatus("VOICE NOT SUPPORTED");
                return;
            }

            visionRecognition = new webkitSpeechRecognition();
            visionRecognition.lang = "en-US";
            visionRecognition.continuous = true;
            visionRecognition.interimResults = false;

            visionRecognition.onresult = async function(event) {
                let heard = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();

                console.log("Vision heard:", heard);

                if (heard.includes("stop")) {
                    stopSpeaking();
                    wakeDetected = false;
                    updateVisionStatus("FRIDAY");
                    return;
                }

                if (heard.includes("friday")) {
                    wakeDetected = true;
                    updateVisionStatus("LISTENING");
                    document.getElementById("visionOutput").innerHTML = "Listening...";
                    return;
                }

                if (wakeDetected && heard.length > 2 && !isLoading) {
                    wakeDetected = false;
                    await sendVisionMessage(heard);
                }
            };

            visionRecognition.onerror = function(event) {
                console.log("Vision voice error:", event.error);
                updateVisionStatus("FRIDAY");
            };

            visionRecognition.onend = function() {
                if (isVisionActive) {
                    try {
                        visionRecognition.start();
                    } catch (e) {
                        console.log("Restart voice failed:", e);
                    }
                }
            };

            try {
                visionRecognition.start();
            } catch (e) {
                console.log("Vision start failed:", e);
            }
        }

        async function sendVisionMessage(message) {
            isLoading = true;
            updateVisionStatus("THINKING");
            document.getElementById("visionOutput").innerHTML = `You said: ${message}`;

            try {
                let response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });

                let data = await response.json();

                updateVisionStatus("SPEAKING");
                startSpeakingWave();

                // stop recognition while speaking
                try { visionRecognition.stop(); } catch(e) {}

                showVisionOutput(data.reply);
                speakReply(data.reply);

            } catch (error) {
                updateVisionStatus("ERROR");
                stopSpeakingWave();
            }

            isLoading = false;
        }

        function speakReply(text) {
            if (!("speechSynthesis" in window)) return;

            speechSynthesis.cancel();

            let cleanText = text.replace(/[*_`#>-]/g, "");

            let utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = "en-US";
            utterance.rate = 0.9;
            utterance.pitch = 0.9;
            utterance.volume = 1;

            let voices = speechSynthesis.getVoices();

            let selectedVoice = voices.find(v =>
                v.name.toLowerCase().includes("zira") ||
                v.name.toLowerCase().includes("samantha") ||
                v.name.toLowerCase().includes("google us english") ||
                v.name.toLowerCase().includes("female")
            );

            if (selectedVoice) {
                utterance.voice = selectedVoice;
            }

            utterance.onend = function() {
                stopSpeakingWave();
                updateVisionStatus("FRIDAY");

    // restart listening after speaking
                if (isVisionActive && visionRecognition) {
                    try {
                        visionRecognition.start();
                    } catch (e) {}
                }
            };

            utterance.onerror = function() {
                stopSpeakingWave();
                updateVisionStatus("FRIDAY");
            };

            speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
